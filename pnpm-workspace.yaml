packages:
  - "apps/*"
  - "packages/*"

# Allow these dependencies to run install scripts (pnpm blocks them by default).
allowBuilds:
  esbuild: true
  sharp: true
  unrs-resolver: true
  ffmpeg-static: true
  "@resvg/resvg-js": true

# Centralized dependency versions (pnpm catalog).
# Reference from any package with the spec "catalog:".
# Keeping versions here means a single place to bump and guarantees every
# workspace package resolves the exact same version — no drift.
catalog:
  # Runtime / framework
  next: ^15.5.0
  react: ^19.0.0
  react-dom: ^19.0.0

  # Language / tooling
  typescript: ^5.7.0
  tsx: ^4.19.0
  "@types/node": ^22.10.0
  "@types/react": ^19.0.0
  "@types/react-dom": ^19.0.0

  # Validation & forms
  zod: ^3.24.0
  react-hook-form: ^7.54.0
  "@hookform/resolvers": ^3.9.0

  # Data fetching
  "@tanstack/react-query": ^5.62.0

  # Database
  drizzle-orm: ^0.38.0
  drizzle-kit: ^0.30.0
  pg: ^8.13.0
  "@types/pg": ^8.11.0

  # Auth
  better-auth: ^1.1.0

  # IDs & crypto
  nanoid: ^5.0.9
  bcryptjs: ^2.4.3
  "@types/bcryptjs": ^2.4.6

  # Styling / UI
  tailwindcss: ^4.0.0
  "@tailwindcss/postcss": ^4.0.0
  tw-animate-css: ^1.0.0
  lucide-react: ^0.468.0
  clsx: ^2.1.1
  tailwind-merge: ^2.6.0
  class-variance-authority: ^0.7.1
  sonner: ^1.7.0

  # Radix primitives (used by shadcn components)
  "@radix-ui/react-dialog": ^1.1.4
  "@radix-ui/react-tabs": ^1.1.2
  "@radix-ui/react-slot": ^1.1.1
  "@radix-ui/react-label": ^2.1.1
  "@radix-ui/react-progress": ^1.1.1
  "@radix-ui/react-dropdown-menu": ^2.1.4
  "@radix-ui/react-select": ^2.1.4
  "@radix-ui/react-avatar": ^1.1.2

  # Media / files
  sharp: ^0.33.5
  fluent-ffmpeg: ^2.1.3
  "@types/fluent-ffmpeg": ^2.1.27
  ffmpeg-static: ^5.2.0
  ffprobe-static: ^3.1.0

  # Image generation (Instagram art)
  satori: ^0.12.0
  "@resvg/resvg-js": ^2.6.2
  "@fontsource/fraunces": ^5.1.0
  "@fontsource/inter-tight": ^5.1.0

  # Background jobs
  inngest: ^3.27.0

  # Email
  resend: ^4.0.0
  "@react-email/components": ^0.0.31

  # Utils
  date-fns: ^4.1.0

  # Lint / format
  prettier: ^3.4.0
  eslint: ^9.17.0
  "@types/eslint": ^9.6.1
  eslint-config-next: ^15.5.0
